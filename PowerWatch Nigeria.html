<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PowerWatch Nigeria</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0B0F1A;
    --bg2: #111827;
    --bg3: #1a2235;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --green: oklch(58% 0.18 145deg);
    --green-glow: oklch(58% 0.18 145deg / 0.3);
    --green-dim: oklch(40% 0.12 145deg);
    --amber: oklch(72% 0.18 75deg);
    --amber-glow: oklch(72% 0.18 75deg / 0.3);
    --red: oklch(55% 0.2 25deg);
    --red-glow: oklch(55% 0.2 25deg / 0.3);
    --text: #F0F4FF;
    --text2: #8B95B0;
    --text3: #4A5470;
    --card: rgba(255,255,255,0.04);
    --card-hover: rgba(255,255,255,0.07);
    --radius: 16px;
    --radius-sm: 10px;
    --font-display: 'Syne', sans-serif;
    --font-body: 'DM Sans', sans-serif;
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font-body); overflow-x: hidden; }
  #root { min-height: 100%; }

  /* Grid texture background */
  body::before {
    content: '';
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.018) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.018) 1px, transparent 1px);
    background-size: 40px 40px;
  }

  @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
  @keyframes waveform {
    0% { d: path("M0,12 Q10,6 20,12 Q30,18 40,12 Q50,6 60,12 Q70,18 80,12"); }
    50% { d: path("M0,12 Q10,18 20,12 Q30,6 40,12 Q50,18 60,12 Q70,6 80,12"); }
    100% { d: path("M0,12 Q10,6 20,12 Q30,18 40,12 Q50,6 60,12 Q70,18 80,12"); }
  }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  @keyframes shimmer {
    0% { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
  @keyframes slideIn { from{transform:translateX(100%);opacity:0} to{transform:translateX(0);opacity:1} }
  @keyframes mapPing {
    0% { transform: scale(1); opacity: 1; }
    100% { transform: scale(3); opacity: 0; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "dark",
  "accentColor": "green",
  "homepageVariant": "A",
  "showAnimations": true,
  "fontScale": 1
}/*EDITMODE-END*/;

// ─── DESIGN TOKENS ───────────────────────────────────────────────
const ACCENT_MAP = {
  green: { main: 'oklch(58% 0.18 145deg)', glow: 'oklch(58% 0.18 145deg / 0.25)', dim: 'oklch(40% 0.12 145deg)', css: '#00A651' },
  blue:  { main: 'oklch(60% 0.2 230deg)',  glow: 'oklch(60% 0.2 230deg / 0.25)',  dim: 'oklch(40% 0.14 230deg)', css: '#0066FF' },
  amber: { main: 'oklch(72% 0.18 75deg)',  glow: 'oklch(72% 0.18 75deg / 0.25)',  dim: 'oklch(50% 0.12 75deg)',  css: '#F5A623' },
};

// ─── MOCK DATA ────────────────────────────────────────────────────
const MOCK_STATES = [
  { name: 'Lagos',       status: 'partial', uptime: 62, reports: 134, band: 'A/B' },
  { name: 'Abuja',       status: 'on',      uptime: 88, reports: 12,  band: 'A' },
  { name: 'Kano',        status: 'off',     uptime: 21, reports: 218, band: 'D' },
  { name: 'Ibadan',      status: 'partial', uptime: 45, reports: 97,  band: 'B/C' },
  { name: 'Port Harcourt',status:'on',      uptime: 74, reports: 31,  band: 'A/B' },
  { name: 'Enugu',       status: 'off',     uptime: 18, reports: 167, band: 'E' },
  { name: 'Kaduna',      status: 'partial', uptime: 39, reports: 88,  band: 'C/D' },
  { name: 'Jos',         status: 'off',     uptime: 14, reports: 201, band: 'E' },
  { name: 'Benin',       status: 'partial', uptime: 53, reports: 62,  band: 'B/C' },
  { name: 'Warri',       status: 'on',      uptime: 71, reports: 24,  band: 'A/B' },
];

const RECENT_REPORTS = [
  { area: 'Surulere, Lagos',     type: 'outage',   time: '3 min ago',  disco: 'IKEDC' },
  { area: 'Wuse II, Abuja',      type: 'restored', time: '11 min ago', disco: 'AEDC'  },
  { area: 'Tudun Wada, Kano',    type: 'outage',   time: '18 min ago', disco: 'KEDCO' },
  { area: 'Bodija, Ibadan',      type: 'low_volt', time: '24 min ago', disco: 'IBEDC' },
  { area: 'GRA, Port Harcourt',  type: 'restored', time: '31 min ago', disco: 'PHEDC' },
  { area: 'Independence Layout', type: 'outage',   time: '45 min ago', disco: 'EEDC'  },
];

const STATUS_COLOR = { on: '#00A651', partial: '#F5A623', off: '#E53935' };
const STATUS_LABEL = { on: 'Power On', partial: 'Partial', off: 'No Power' };

// ─── SHARED COMPONENTS ────────────────────────────────────────────

function NavBar({ page, setPage, accent }) {
  const [open, setOpen] = useState(false);
  const accentColor = accent.css;
  return (
    <nav style={{
      position: 'fixed', top: 0, left: 0, right: 0, zIndex: 100,
      background: 'rgba(11,15,26,0.85)',
      backdropFilter: 'blur(20px)',
      borderBottom: '1px solid rgba(255,255,255,0.07)',
      padding: '0 20px',
      height: 60,
      display: 'flex', alignItems: 'center', justifyContent: 'space-between',
    }}>
      {/* Logo */}
      <button onClick={() => setPage('home')} style={{
        background: 'none', border: 'none', cursor: 'pointer',
        display: 'flex', alignItems: 'center', gap: 10,
      }}>
        <div style={{
          width: 32, height: 32, borderRadius: 8,
          background: `linear-gradient(135deg, ${accentColor}, ${accent.main})`,
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          boxShadow: `0 0 16px ${accent.glow}`,
        }}>
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <path d="M10 2L4 10h5l-1 6 6-8h-5l1-6z" fill="white" strokeLinejoin="round"/>
          </svg>
        </div>
        <span style={{ fontFamily: 'var(--font-display)', fontWeight: 800, fontSize: 16, color: 'var(--text)', letterSpacing: '-0.02em' }}>
          Power<span style={{ color: accentColor }}>Watch</span>
        </span>
      </button>

      {/* Desktop nav */}
      <div style={{ display: 'flex', gap: 4, alignItems: 'center' }}>
        {[['home','Home'],['dashboard','Map & Stats'],['report','Report']].map(([id, label]) => (
          <button key={id} onClick={() => setPage(id)} style={{
            background: page === id ? `${accentColor}18` : 'none',
            border: page === id ? `1px solid ${accentColor}40` : '1px solid transparent',
            borderRadius: 8, padding: '6px 14px',
            color: page === id ? accentColor : 'var(--text2)',
            fontFamily: 'var(--font-body)', fontSize: 14, fontWeight: 500,
            cursor: 'pointer', transition: 'all 0.2s',
          }}>{label}</button>
        ))}
        <button onClick={() => setPage('report')} style={{
          background: accentColor, border: 'none', borderRadius: 8,
          padding: '7px 16px', color: '#fff', fontFamily: 'var(--font-body)',
          fontSize: 14, fontWeight: 600, cursor: 'pointer', marginLeft: 8,
          boxShadow: `0 0 20px ${accent.glow}`,
          transition: 'all 0.2s',
        }}>Report Outage</button>
      </div>
    </nav>
  );
}

function StatusBadge({ status, size = 'sm' }) {
  const color = STATUS_COLOR[status];
  const label = STATUS_LABEL[status];
  return (
    <span style={{
      display: 'inline-flex', alignItems: 'center', gap: 5,
      background: `${color}18`, border: `1px solid ${color}40`,
      borderRadius: 100, padding: size === 'lg' ? '5px 12px' : '3px 9px',
      fontSize: size === 'lg' ? 13 : 11, fontWeight: 600,
      color: color, fontFamily: 'var(--font-body)', whiteSpace: 'nowrap',
    }}>
      <span style={{
        width: 6, height: 6, borderRadius: '50%', background: color,
        animation: status !== 'off' ? 'pulse 2s infinite' : 'none',
        flexShrink: 0,
      }}></span>
      {label}
    </span>
  );
}

function WaveformSVG({ color = '#00A651', height = 24 }) {
  return (
    <svg width="80" height={height} viewBox={`0 0 80 ${height}`} fill="none">
      <path
        d={`M0,${height/2} Q10,${height/2-6} 20,${height/2} Q30,${height/2+6} 40,${height/2} Q50,${height/2-6} 60,${height/2} Q70,${height/2+6} 80,${height/2}`}
        stroke={color} strokeWidth="1.5" strokeLinecap="round" fill="none" opacity="0.6"
      />
      <path
        d={`M0,${height/2} Q10,${height/2+4} 20,${height/2} Q30,${height/2-4} 40,${height/2} Q50,${height/2+4} 60,${height/2} Q70,${height/2-4} 80,${height/2}`}
        stroke={color} strokeWidth="1" strokeLinecap="round" fill="none" opacity="0.3"
      />
    </svg>
  );
}

// ─── PAGE: HOME ────────────────────────────────────────────────────
function HomePage({ setPage, accent, variant, animated }) {
  const [loaded, setLoaded] = useState(false);
  useEffect(() => { setTimeout(() => setLoaded(true), 100); }, []);

  const anim = (delay = 0) => animated ? {
    opacity: loaded ? 1 : 0,
    transform: loaded ? 'translateY(0)' : 'translateY(24px)',
    transition: `all 0.6s ease ${delay}ms`,
  } : {};

  // Stats ticker data
  const stats = [
    { label: 'Active Reports', value: '1,247', icon: '⚡' },
    { label: 'Areas Monitored', value: '3,891', icon: '📍' },
    { label: 'Avg Uptime Today', value: '43%', icon: '📊' },
    { label: 'States Covered', value: '36', icon: '🗺️' },
  ];

  if (variant === 'A') return <HomeVariantA setPage={setPage} accent={accent} anim={anim} stats={stats} />;
  if (variant === 'B') return <HomeVariantB setPage={setPage} accent={accent} anim={anim} stats={stats} />;
  return <HomeVariantC setPage={setPage} accent={accent} anim={anim} stats={stats} />;
}

function HomeVariantA({ setPage, accent, anim, stats }) {
  // Bold full-bleed hero with animated grid
  return (
    <div style={{ paddingTop: 60, minHeight: '100vh' }}>
      {/* Hero */}
      <section style={{
        minHeight: 'calc(100vh - 60px)', display: 'flex', flexDirection: 'column',
        alignItems: 'center', justifyContent: 'center', padding: '60px 20px 80px',
        position: 'relative', overflow: 'hidden', textAlign: 'center',
      }}>
        {/* Glow orb */}
        <div style={{
          position: 'absolute', top: '20%', left: '50%', transform: 'translateX(-50%)',
          width: 600, height: 600, borderRadius: '50%',
          background: `radial-gradient(circle, ${accent.glow} 0%, transparent 70%)`,
          pointerEvents: 'none',
        }}/>
        {/* Concentric rings */}
        {[200, 340, 480].map((size, i) => (
          <div key={i} style={{
            position: 'absolute', top: '50%', left: '50%',
            transform: 'translate(-50%, -50%)',
            width: size, height: size, borderRadius: '50%',
            border: `1px solid ${accent.main}`,
            opacity: 0.06 + i * 0.03,
            pointerEvents: 'none',
          }}/>
        ))}

        <div style={{ position: 'relative', zIndex: 1, maxWidth: 720 }}>
          {/* Eyebrow */}
          <div style={{ ...anim(0), display: 'flex', justifyContent: 'center', marginBottom: 24 }}>
            <span style={{
              display: 'inline-flex', alignItems: 'center', gap: 8,
              background: `${accent.css}18`, border: `1px solid ${accent.css}40`,
              borderRadius: 100, padding: '6px 16px',
              fontSize: 12, fontWeight: 600, color: accent.css,
              letterSpacing: '0.08em', textTransform: 'uppercase',
            }}>
              <span style={{ width: 6, height: 6, borderRadius: '50%', background: accent.css, animation: 'pulse 2s infinite' }}></span>
              Live Nationwide Monitoring
            </span>
          </div>

          <h1 style={{
            ...anim(100),
            fontFamily: 'var(--font-display)', fontWeight: 800,
            fontSize: 'clamp(40px, 10vw, 88px)', lineHeight: 1.0,
            letterSpacing: '-0.04em', marginBottom: 24,
            color: 'var(--text)',
          }}>
            Know Your<br/>
            <span style={{
              background: `linear-gradient(135deg, ${accent.css}, oklch(72% 0.18 75deg))`,
              WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent',
            }}>Power Status</span>
          </h1>

          <p style={{
            ...anim(200),
            fontSize: 'clamp(16px, 3vw, 20px)', color: 'var(--text2)',
            lineHeight: 1.6, marginBottom: 40, maxWidth: 520, margin: '0 auto 40px',
            fontWeight: 300,
          }}>
            Track outages, report power cuts, and see real-time electricity availability across every neighbourhood in Nigeria.
          </p>

          <div style={{ ...anim(300), display: 'flex', gap: 12, justifyContent: 'center', flexWrap: 'wrap', marginBottom: 60 }}>
            <button onClick={() => setPage('dashboard')} style={{
              background: accent.css, border: 'none', borderRadius: 12,
              padding: '14px 28px', color: '#fff', fontSize: 16, fontWeight: 600,
              cursor: 'pointer', boxShadow: `0 0 32px ${accent.glow}`,
              fontFamily: 'var(--font-body)', transition: 'transform 0.2s',
            }}>View Live Map →</button>
            <button onClick={() => setPage('report')} style={{
              background: 'rgba(255,255,255,0.06)', border: '1px solid rgba(255,255,255,0.12)',
              borderRadius: 12, padding: '14px 28px', color: 'var(--text)',
              fontSize: 16, fontWeight: 500, cursor: 'pointer',
              fontFamily: 'var(--font-body)', transition: 'background 0.2s',
            }}>Report Outage</button>
          </div>

          {/* Stats row */}
          <div style={{ ...anim(400), display: 'flex', gap: 0, justifyContent: 'center', flexWrap: 'wrap' }}>
            {stats.map((s, i) => (
              <div key={i} style={{
                padding: '16px 28px', textAlign: 'center',
                borderRight: i < stats.length-1 ? '1px solid rgba(255,255,255,0.08)' : 'none',
              }}>
                <div style={{ fontSize: 24, fontFamily: 'var(--font-display)', fontWeight: 800, color: 'var(--text)' }}>{s.value}</div>
                <div style={{ fontSize: 11, color: 'var(--text2)', marginTop: 2, fontWeight: 500, letterSpacing: '0.04em', textTransform: 'uppercase' }}>{s.label}</div>
              </div>
            ))}
          </div>
        </div>
      </section>

      {/* Status ticker */}
      <StatusTickerSection accent={accent} />

      {/* Features grid */}
      <FeaturesSection setPage={setPage} accent={accent} anim={anim} />

      {/* Recent reports */}
      <RecentReportsSection accent={accent} />
    </div>
  );
}

function HomeVariantB({ setPage, accent, anim, stats }) {
  // Split layout: left text, right live map preview
  return (
    <div style={{ paddingTop: 60, minHeight: '100vh' }}>
      <section style={{
        minHeight: 'calc(100vh - 60px)',
        display: 'grid', gridTemplateColumns: '1fr 1fr',
        gap: 0, alignItems: 'stretch',
      }}>
        {/* Left: Text */}
        <div style={{
          padding: 'clamp(40px,6vw,80px)',
          display: 'flex', flexDirection: 'column', justifyContent: 'center',
          borderRight: '1px solid rgba(255,255,255,0.06)',
          position: 'relative',
        }}>
          <div style={{ ...anim(0), marginBottom: 20 }}>
            <span style={{
              display: 'inline-flex', alignItems: 'center', gap: 6,
              background: `${accent.css}15`, borderRadius: 100,
              padding: '5px 12px', fontSize: 11, fontWeight: 700,
              color: accent.css, letterSpacing: '0.1em', textTransform: 'uppercase',
              border: `1px solid ${accent.css}30`,
            }}>⚡ Real-time Tracking</span>
          </div>
          <h1 style={{
            ...anim(80),
            fontFamily: 'var(--font-display)', fontWeight: 800,
            fontSize: 'clamp(36px, 5vw, 72px)', lineHeight: 1.05,
            letterSpacing: '-0.03em', marginBottom: 20,
          }}>
            Nigeria's Power<br/>
            <span style={{ color: accent.css }}>Grid, Exposed.</span>
          </h1>
          <p style={{ ...anim(160), fontSize: 17, color: 'var(--text2)', lineHeight: 1.7, marginBottom: 36, maxWidth: 440, fontWeight: 300 }}>
            Community-powered outage tracking. Know before you pack up, before you rush home — see the power status of any area in Nigeria, right now.
          </p>
          <div style={{ ...anim(240), display: 'flex', flexDirection: 'column', gap: 12, marginBottom: 40, maxWidth: 400 }}>
            <SearchBar accent={accent} setPage={setPage} />
          </div>
          <div style={{ ...anim(320), display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12, maxWidth: 400 }}>
            {stats.slice(0,4).map((s,i) => (
              <div key={i} style={{
                background: 'rgba(255,255,255,0.03)', border: '1px solid rgba(255,255,255,0.06)',
                borderRadius: 12, padding: '14px 16px',
              }}>
                <div style={{ fontSize: 22, fontFamily: 'var(--font-display)', fontWeight: 800, color: 'var(--text)' }}>{s.value}</div>
                <div style={{ fontSize: 11, color: 'var(--text3)', marginTop: 3, fontWeight: 500, textTransform: 'uppercase', letterSpacing: '0.05em' }}>{s.label}</div>
              </div>
            ))}
          </div>
        </div>

        {/* Right: Mini map mockup */}
        <div style={{
          background: 'var(--bg2)', position: 'relative', overflow: 'hidden',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          minHeight: 500,
        }}>
          <MiniMapMockup accent={accent} setPage={setPage} />
        </div>
      </section>
      <StatusTickerSection accent={accent} />
      <FeaturesSection setPage={setPage} accent={accent} anim={anim} />
      <RecentReportsSection accent={accent} />
    </div>
  );
}

function HomeVariantC({ setPage, accent, anim, stats }) {
  // Editorial / magazine style with large type and asymmetric grid
  return (
    <div style={{ paddingTop: 60 }}>
      {/* Full-bleed header band */}
      <div style={{
        background: accent.css,
        padding: '10px 20px',
        display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 20,
        overflow: 'hidden',
      }}>
        {['Lagos: Partial', 'Abuja: On', 'Kano: Off', 'Ibadan: Partial', 'PHC: On', 'Enugu: Off'].map((t,i) => (
          <span key={i} style={{ fontSize: 11, fontWeight: 700, color: 'rgba(0,0,0,0.8)', whiteSpace: 'nowrap', letterSpacing: '0.06em', textTransform: 'uppercase' }}>
            {t} {i < 5 ? '·' : ''}
          </span>
        ))}
      </div>

      {/* Hero */}
      <section style={{ padding: '80px 24px 60px', maxWidth: 900, margin: '0 auto' }}>
        <div style={{ ...anim(0), display: 'flex', alignItems: 'baseline', gap: 16, marginBottom: 16 }}>
          <span style={{ fontFamily: 'var(--font-display)', fontSize: 11, fontWeight: 700, color: 'var(--text3)', letterSpacing: '0.15em', textTransform: 'uppercase' }}>Vol. 1 — May 2026</span>
          <span style={{ flex: 1, height: 1, background: 'rgba(255,255,255,0.08)' }}></span>
          <span style={{ fontFamily: 'var(--font-display)', fontSize: 11, fontWeight: 700, color: accent.css, letterSpacing: '0.15em', textTransform: 'uppercase' }}>Live</span>
        </div>
        <h1 style={{
          ...anim(80),
          fontFamily: 'var(--font-display)', fontWeight: 800,
          fontSize: 'clamp(52px, 12vw, 120px)', lineHeight: 0.92,
          letterSpacing: '-0.05em', marginBottom: 32,
          textTransform: 'uppercase',
        }}>
          POWER<br/>
          <span style={{
            WebkitTextStroke: `2px ${accent.css}`,
            WebkitTextFillColor: 'transparent',
          }}>WATCH</span><br/>
          NIGERIA
        </h1>

        <div style={{ display: 'grid', gridTemplateColumns: '1fr auto', gap: 40, alignItems: 'end' }}>
          <p style={{ ...anim(160), fontSize: 18, color: 'var(--text2)', lineHeight: 1.6, maxWidth: 480, fontWeight: 300 }}>
            Nigeria's first community-driven electricity grid monitor. Track power outages, report your situation, and hold distributors accountable.
          </p>
          <div style={{ ...anim(240), display: 'flex', flexDirection: 'column', gap: 10 }}>
            <button onClick={() => setPage('dashboard')} style={{
              background: accent.css, border: 'none', borderRadius: 10,
              padding: '13px 24px', color: '#fff', fontSize: 15, fontWeight: 700,
              cursor: 'pointer', whiteSpace: 'nowrap', fontFamily: 'var(--font-body)',
            }}>View Map →</button>
            <button onClick={() => setPage('report')} style={{
              background: 'none', border: `1px solid rgba(255,255,255,0.15)`,
              borderRadius: 10, padding: '12px 24px', color: 'var(--text)',
              fontSize: 15, fontWeight: 500, cursor: 'pointer', fontFamily: 'var(--font-body)',
            }}>Report Outage</button>
          </div>
        </div>
      </section>

      {/* Stats band */}
      <div style={{
        borderTop: '1px solid rgba(255,255,255,0.07)',
        borderBottom: '1px solid rgba(255,255,255,0.07)',
        display: 'flex', justifyContent: 'space-around', padding: '28px 24px',
        background: 'rgba(255,255,255,0.02)',
      }}>
        {stats.map((s,i) => (
          <div key={i} style={{ textAlign: 'center' }}>
            <div style={{ fontFamily: 'var(--font-display)', fontSize: 32, fontWeight: 800, color: accent.css }}>{s.value}</div>

            <span style={{
              background: `${t.color}18`, color: t.color, border: `1px solid ${t.color}30`,
              borderRadius: 100, padding: '3px 10px', fontSize: 11, fontWeight: 700,
            }}>{t.label}</span>
            <span style={{ fontSize: 11, color: 'var(--text3)' }}>{r.time}</span>
          </div>
        );
      })}
    </div>
  );
}

// ─── PAGE: REPORT ──────────────────────────────────────────────────
function ReportPage({ accent }) {
  const [step, setStep] = useState(1);
  const [formData, setFormData] = useState({ type: '', area: '', disco: '', desc: '', phone: '' });
  const [submitted, setSubmitted] = useState(false);

  const TOTAL_STEPS = 3;

  const handleSubmit = () => {
    setSubmitted(true);
  };

  if (submitted) return <ReportSuccess accent={accent} onReset={() => { setSubmitted(false); setStep(1); setFormData({ type:'',area:'',disco:'',desc:'',phone:'' }); }} />;

  return (
    <div style={{ paddingTop: 60, minHeight: '100vh', display: 'flex', alignItems: 'flex-start', justifyContent: 'center', padding: '100px 24px 60px' }}>
      <div style={{ width: '100%', maxWidth: 560 }}>
        {/* Header */}
        <div style={{ marginBottom: 40, textAlign: 'center' }}>
          <div style={{
            width: 56, height: 56, borderRadius: 16, margin: '0 auto 16px',
            background: `linear-gradient(135deg, ${accent.css}30, ${accent.css}10)`,
            border: `1px solid ${accent.css}30`,
            display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 24,
          }}>⚡</div>
          <h1 style={{ fontFamily: 'var(--font-display)', fontWeight: 800, fontSize: 'clamp(28px,5vw,40px)', letterSpacing: '-0.03em', marginBottom: 8 }}>Report a Power Issue</h1>
          <p style={{ color: 'var(--text2)', fontSize: 15, lineHeight: 1.6 }}>Help your community stay informed. Takes under 30 seconds.</p>
        </div>

        {/* Progress */}
        <div style={{ display: 'flex', gap: 8, marginBottom: 36 }}>
          {Array.from({ length: TOTAL_STEPS }).map((_, i) => (
            <div key={i} style={{
              flex: 1, height: 4, borderRadius: 100,
              background: i < step ? accent.css : 'rgba(255,255,255,0.08)',
              transition: 'background 0.3s',
            }}/>
          ))}
        </div>

        {/* Form steps */}
        <div style={{
          background: 'rgba(255,255,255,0.03)', border: '1px solid rgba(255,255,255,0.08)',
          borderRadius: 20, padding: '32px 28px',
        }}>
          {step === 1 && (
            <div>
              <h2 style={{ fontFamily: 'var(--font-display)', fontWeight: 700, fontSize: 22, marginBottom: 8 }}>What's the issue?</h2>
              <p style={{ color: 'var(--text2)', fontSize: 14, marginBottom: 24 }}>Step 1 of {TOTAL_STEPS}</p>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
                {[
                  { value: 'outage',   label: 'Complete Outage',    sub: 'No power at all',       icon: '🔴' },
                  { value: 'low_volt', label: 'Low Voltage',        sub: 'Unstable or weak power', icon: '🟡' },
                  { value: 'restored', label: 'Power Restored',     sub: 'Reporting it came back', icon: '🟢' },
                  { value: 'flicker',  label: 'Frequent Flickers',  sub: 'On/off irregularly',    icon: '⚡' },
                ].map(opt => (
                  <button key={opt.value} onClick={() => setFormData(p => ({ ...p, type: opt.value }))} style={{
                    background: formData.type === opt.value ? `${accent.css}18` : 'rgba(255,255,255,0.03)',
                    border: formData.type === opt.value ? `1px solid ${accent.css}60` : '1px solid rgba(255,255,255,0.07)',
                    borderRadius: 12, padding: '14px 16px',
                    display: 'flex', alignItems: 'center', gap: 14,
                    cursor: 'pointer', transition: 'all 0.15s', textAlign: 'left',
                  }}>
                    <span style={{ fontSize: 20 }}>{opt.icon}</span>
                    <div>
                      <div style={{ fontWeight: 600, fontSize: 15, color: 'var(--text)', fontFamily: 'var(--font-body)' }}>{opt.label}</div>
                      <div style={{ fontSize: 12, color: 'var(--text2)', marginTop: 2 }}>{opt.sub}</div>
                    </div>
                  </button>
                ))}
              </div>
            </div>
          )}

          {step === 2 && (
            <div>
              <h2 style={{ fontFamily: 'var(--font-display)', fontWeight: 700, fontSize: 22, marginBottom: 8 }}>Where are you?</h2>
              <p style={{ color: 'var(--text2)', fontSize: 14, marginBottom: 24 }}>Step 2 of {TOTAL_STEPS}</p>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
                {[
                  { key: 'area', label: 'Your Area / Neighbourhood', placeholder: 'e.g. Surulere, Lagos' },
                  { key: 'disco', label: 'Distribution Company (DISCO)', placeholder: 'e.g. IKEDC, AEDC, KEDCO…' },
                  { key: 'desc', label: 'Additional Details (optional)', placeholder: 'How long? Any other info?', multi: true },
                ].map(f => (
                  <div key={f.key}>
                    <label style={{ display: 'block', fontSize: 12, fontWeight: 700, color: 'var(--text2)', marginBottom: 8, textTransform: 'uppercase', letterSpacing: '0.07em' }}>{f.label}</label>
                    {f.multi ? (
                      <textarea value={formData[f.key]} onChange={e => setFormData(p => ({ ...p, [f.key]: e.target.value }))}
                        placeholder={f.placeholder} rows={3}
                        style={{ width: '100%', background: 'rgba(255,255,255,0.05)', border: '1px solid rgba(255,255,255,0.1)', borderRadius: 10, padding: '12px 14px', color: 'var(--text)', fontSize: 14, fontFamily: 'var(--font-body)', outline: 'none', resize: 'vertical' }}
                      />
                    ) : (
                      <input value={formData[f.key]} onChange={e => setFormData(p => ({ ...p, [f.key]: e.target.value }))}
                        placeholder={f.placeholder}
                        style={{ width: '100%', background: 'rgba(255,255,255,0.05)', border: '1px solid rgba(255,255,255,0.1)', borderRadius: 10, padding: '12px 14px', color: 'var(--text)', fontSize: 14, fontFamily: 'var(--font-body)', outline: 'none' }}
                      />
                    )}
                  </div>
                ))}
              </div>
            </div>
          )}

          {step === 3 && (
            <div>
              <h2 style={{ fontFamily: 'var(--font-display)', fontWeight: 700, fontSize: 22, marginBottom: 8 }}>Confirm & Submit</h2>
              <p style={{ color: 'var(--text2)', fontSize: 14, marginBottom: 24 }}>Step 3 of {TOTAL_STEPS} — Review your report</p>
              <div style={{ background: 'rgba(255,255,255,0.03)', borderRadius: 12, padding: 20, marginBottom: 24, display: 'flex', flexDirection: 'column', gap: 14 }}>
                {[
                  ['Issue Type', formData.type ? formData.type.replace('_',' ').replace(/\b\w/g,c=>c.toUpperCase()) : '—'],
                  ['Location', formData.area || '—'],
                  ['DISCO', formData.disco || '—'],
                  ['Details', formData.desc || 'None provided'],
                ].map(([k,v]) => (
                  <div key={k} style={{ display: 'flex', justifyContent: 'space-between', fontSize: 14 }}>
                    <span style={{ color: 'var(--text3)', fontWeight: 600, textTransform: 'uppercase', fontSize: 11, letterSpacing: '0.06em' }}>{k}</span>
                    <span style={{ color: 'var(--text)', fontWeight: 500, textAlign: 'right', maxWidth: '60%' }}>{v}</span>
                  </div>
                ))}
              </div>
              <div style={{ marginBottom: 8 }}>
                <label style={{ display: 'block', fontSize: 12, fontWeight: 700, color: 'var(--text2)', marginBottom: 8, textTransform: 'uppercase', letterSpacing: '0.07em' }}>Phone (optional, for follow-up)</label>
                <input value={formData.phone} onChange={e => setFormData(p => ({ ...p, phone: e.target.value }))}
                  placeholder="+234 800 000 0000"
                  style={{ width: '100%', background: 'rgba(255,255,255,0.05)', border: '1px solid rgba(255,255,255,0.1)', borderRadius: 10, padding: '12px 14px', color: 'var(--text)', fontSize: 14, fontFamily: 'var(--font-body)', outline: 'none' }}
                />
              </div>
            </div>
          )}

          {/* Nav buttons */}
          <div style={{ display: 'flex', gap: 10, marginTop: 28 }}>
            {step > 1 && (
              <button onClick={() => setStep(s => s - 1)} style={{
                background: 'rgba(255,255,255,0.06)', border: '1px solid rgba(255,255,255,0.1)',
                borderRadius: 10, padding: '12px 20px', color: 'var(--text)',
                fontSize: 14, fontWeight: 600, cursor: 'pointer', fontFamily: 'var(--font-body)',
              }}>← Back</button>
            )}
            {step < TOTAL_STEPS ? (
              <button
                onClick={() => step === 1 && !formData.type ? null : setStep(s => s + 1)}
                style={{
                  flex: 1, background: formData.type || step > 1 ? accent.css : 'rgba(255,255,255,0.1)',
                  border: 'none', borderRadius: 10, padding: '13px 20px', color: '#fff',
                  fontSize: 15, fontWeight: 700, cursor: 'pointer', fontFamily: 'var(--font-body)',
                  boxShadow: formData.type || step > 1 ? `0 0 20px ${accent.glow}` : 'none',
                  transition: 'all 0.2s',
                }}>Continue →</button>
            ) : (
              <button onClick={handleSubmit} style={{
                flex: 1, background: accent.css, border: 'none',
                borderRadius: 10, padding: '13px 20px', color: '#fff',
                fontSize: 15, fontWeight: 700, cursor: 'pointer', fontFamily: 'var(--font-body)',
                boxShadow: `0 0 24px ${accent.glow}`,
              }}>Submit Report ⚡</button>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

function ReportSuccess({ accent, onReset }) {
  return (
    <div style={{
      paddingTop: 60, minHeight: '100vh',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      padding: '60px 24px',
    }}>
      <div style={{ textAlign: 'center', maxWidth: 440 }}>
        <div style={{
          width: 80, height: 80, borderRadius: 24, margin: '0 auto 24px',
          background: `linear-gradient(135deg, ${accent.css}30, ${accent.css}10)`,
          border: `2px solid ${accent.css}50`,
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          fontSize: 36, boxShadow: `0 0 40px ${accent.glow}`,
        }}>✓</div>
        <h1 style={{ fontFamily: 'var(--font-display)', fontWeight: 800, fontSize: 36, letterSpacing: '-0.03em', marginBottom: 12 }}>Report Submitted!</h1>
        <p style={{ color: 'var(--text2)', fontSize: 16, lineHeight: 1.7, marginBottom: 32 }}>
          Thank you. Your report is now live and visible to the community. Together we hold DISCOs accountable.
        </p>
        <div style={{ display: 'flex', gap: 10, justifyContent: 'center' }}>
          <button onClick={onReset} style={{
            background: accent.css, border: 'none', borderRadius: 10,
            padding: '12px 22px', color: '#fff', fontSize: 14, fontWeight: 600,
            cursor: 'pointer', fontFamily: 'var(--font-body)',
          }}>Report Another</button>
          <button style={{
            background: 'rgba(255,255,255,0.05)', border: '1px solid rgba(255,255,255,0.1)',
            borderRadius: 10, padding: '12px 22px', color: 'var(--text)',
            fontSize: 14, fontWeight: 500, cursor: 'pointer', fontFamily: 'var(--font-body)',
          }}>Share Report</button>
        </div>
      </div>
    </div>
  );
}

// ─── ROOT APP ──────────────────────────────────────────────────────
function App() {
  const { useTweaks, TweaksPanel, TweakSection, TweakRadio, TweakToggle } = window;
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [page, setPage] = useState('home');
  const accent = ACCENT_MAP[tweaks.accentColor] || ACCENT_MAP.green;

  // Inject CSS variable for accent
  useEffect(() => {
    document.documentElement.style.setProperty('--accent', accent.css);
    document.documentElement.style.setProperty('--accent-glow', accent.glow);
  }, [accent]);

  const pageComponents = {
    home:      <HomePage      setPage={setPage} accent={accent} variant={tweaks.homepageVariant} animated={tweaks.showAnimations} />,
    dashboard: <DashboardPage setPage={setPage} accent={accent} />,
    report:    <ReportPage    accent={accent} />,
  };

  return (
    <div>
      <NavBar page={page} setPage={setPage} accent={accent} />
      {pageComponents[page] || pageComponents.home}

      <TweaksPanel>
        <TweakSection label="Homepage Variant">
          <TweakRadio label="Variant" value={tweaks.homepageVariant} options={[{value:'A',label:'A'},{value:'B',label:'B'},{value:'C',label:'C'}]} onChange={v => setTweak('homepageVariant', v)} />
        </TweakSection>
        <TweakSection label="Accent Color">
          <TweakRadio label="Color" value={tweaks.accentColor} options={[{value:'green',label:'Green'},{value:'blue',label:'Blue'},{value:'amber',label:'Amber'}]} onChange={v => setTweak('accentColor', v)} />
        </TweakSection>
        <TweakSection label="Animations">
          <TweakToggle label="Enable animations" value={tweaks.showAnimations} onChange={v => setTweak('showAnimations', v)} />
        </TweakSection>
      </TweaksPanel>
    </div>
  );
}

// Wait for tweaks-panel.jsx to finish exporting to window before mounting
function mountWhenReady() {
  if (window.useTweaks && window.TweaksPanel) {
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  } else {
    setTimeout(mountWhenReady, 50);
  }
}
mountWhenReady();
</script>
</body>
</html>
