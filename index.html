<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PowerWatch Nigeria</title>
    <meta name="theme-color" content="#0B0F1A" />
    <meta name="description" content="Track your electricity supply, know your NERC rights, and generate formal complaint letters when your DisCo falls short." />
    <meta property="og:title" content="PowerWatch Nigeria" />
    <meta property="og:description" content="Track outages, measure supply hours, and hold your DisCo accountable." />
    <meta property="og:type" content="website" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet" />

    <!-- Leaflet -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV/XN/WPcU="
      crossorigin=""
    ></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              bg:          '#0B0F1A',
              surface:     '#111827',
              surface2:    '#1a2235',
              accent:      '#00A651',
              danger:      '#E53935',
              warning:     '#F5A623',
              textPrimary: '#F0F4FF',
              textMuted:   '#8B95B0',
              textDim:     '#4A5470',
            },
            fontFamily: {
              sans:    ['"DM Sans"', 'system-ui', 'sans-serif'],
              display: ['Syne', 'system-ui', 'sans-serif'],
            },
            borderRadius: {
              card: '16px',
              btn:  '10px',
            },
          },
        },
      };
    </script>
    <style>
      /* ── Timing functions ─────────────────────────────────────────── */
      :root {
        --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
        --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
        --ease-out-quart: cubic-bezier(0.25, 1, 0.5, 1);
      }

      /* ── Base ─────────────────────────────────────────────────────── */
      html { scroll-behavior: smooth; }

      body {
        font-family: 'DM Sans', system-ui, sans-serif;
        background-color: #0B0F1A;
        color: #F0F4FF;
        -webkit-tap-highlight-color: transparent;
        -webkit-font-smoothing: antialiased;
      }

      /* ── Grid texture ─────────────────────────────────────────────── */
      body::before {
        content: '';
        position: fixed; inset: 0; pointer-events: none; z-index: 0;
        background-image:
          linear-gradient(rgba(255,255,255,0.018) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255,255,255,0.018) 1px, transparent 1px);
        background-size: 40px 40px;
      }

      /* ── Page transition ──────────────────────────────────────────── */
      @keyframes page-enter {
        from { opacity: 0; transform: translateY(8px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      .page-enter {
        animation: page-enter 0.22s var(--ease-out-expo) both;
      }

      /* ── Toast ────────────────────────────────────────────────────── */
      @keyframes toast-enter {
        from { opacity: 0; transform: translateX(10px) scale(0.95); }
        to   { opacity: 1; transform: translateX(0) scale(1); }
      }
      .toast-enter {
        animation: toast-enter 0.22s var(--ease-out-expo) both;
      }

      /* ── Outage button — layered shadow pulse ─────────────────────── */
      @keyframes outage-pulse {
        0%, 100% {
          box-shadow:
            0 0 0 0 rgba(229, 57, 53, 0.45),
            0 6px 32px rgba(229, 57, 53, 0.25);
        }
        50% {
          box-shadow:
            0 0 0 14px rgba(229, 57, 53, 0),
            0 6px 32px rgba(229, 57, 53, 0.08);
        }
      }
      .btn-outage {
        animation: outage-pulse 2.2s ease-in-out infinite;
        transition: transform 0.12s var(--spring), opacity 0.12s ease;
      }
      .btn-outage:active { transform: scale(0.97); }

      /* ── Restore button ───────────────────────────────────────────── */
      @keyframes restore-pulse {
        0%, 100% {
          box-shadow:
            0 0 0 0 rgba(0, 166, 81, 0.45),
            0 6px 32px rgba(0, 166, 81, 0.25);
        }
        50% {
          box-shadow:
            0 0 0 14px rgba(0, 166, 81, 0),
            0 6px 32px rgba(0, 166, 81, 0.08);
        }
      }
      .btn-restore {
        animation: restore-pulse 2.2s ease-in-out infinite;
        transition: transform 0.12s var(--spring), opacity 0.12s ease;
      }
      .btn-restore:active { transform: scale(0.97); }

      /* ── Banner ───────────────────────────────────────────────────── */
      @keyframes banner-breathe {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0.82; }
      }
      .banner-pulse {
        animation: banner-breathe 2.5s ease-in-out infinite;
      }

      /* ── Blink dot ────────────────────────────────────────────────── */
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0.2; }
      }
      .blink { animation: blink 1.1s ease-in-out infinite; }

      /* ── Skeleton shimmer ─────────────────────────────────────────── */
      @keyframes shimmer {
        0%   { background-position: -200% 0; }
        100% { background-position:  200% 0; }
      }
      .skeleton {
        background: linear-gradient(90deg, #111827 25%, #1a2235 50%, #111827 75%);
        background-size: 200% 100%;
        animation: shimmer 1.6s ease-in-out infinite;
        border-radius: 6px;
      }

      /* ── Interactive card lift ────────────────────────────────────── */
      .card-lift {
        transition: transform 0.18s var(--ease-out-expo), box-shadow 0.18s ease;
      }
      .card-lift:hover {
        transform: translateY(-1px);
        box-shadow: 0 8px 24px rgba(0,0,0,0.2);
      }

      /* ── Nav tab press ────────────────────────────────────────────── */
      .nav-tab { transition: color 0.15s ease, background-color 0.15s ease, transform 0.1s var(--spring); }
      .nav-tab:active { transform: scale(0.88); }

      /* ── Button press utility ─────────────────────────────────────── */
      .btn-press {
        transition: transform 0.1s var(--spring), opacity 0.1s ease, box-shadow 0.15s ease;
      }
      .btn-press:active { transform: scale(0.97); opacity: 0.9; }

      /* ── Stagger fade-up for dashboard items ──────────────────────── */
      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(16px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      .fade-up { animation: fadeUp 0.45s cubic-bezier(0.16,1,0.3,1) both; }
      .fade-up-1 { animation-delay: 80ms; }
      .fade-up-2 { animation-delay: 160ms; }
      .fade-up-3 { animation-delay: 240ms; }

      /* ── Status dot pulse ─────────────────────────────────────────── */
      @keyframes statusPulse {
        0%,100% { opacity: 1; }
        50%     { opacity: 0.35; }
      }
      .status-pulse { animation: statusPulse 2s ease-in-out infinite; }

      /* ── Map ping ─────────────────────────────────────────────────── */
      @keyframes mapPing {
        0%   { transform: scale(1); opacity: 0.8; }
        100% { transform: scale(2.8); opacity: 0; }
      }

      /* ── Status badge pill ────────────────────────────────────────── */
      .badge {
        display: inline-flex; align-items: center; gap: 5px;
        border-radius: 100px; padding: 3px 10px;
        font-size: 11px; font-weight: 700;
        white-space: nowrap; font-family: 'DM Sans', system-ui, sans-serif;
      }

      /* ── Primary glow button ──────────────────────────────────────── */
      .btn-glow {
        box-shadow: 0 0 24px rgba(0,166,81,0.28), 0 1px 0 rgba(255,255,255,0.1) inset;
        transition: box-shadow 0.2s ease, transform 0.1s ease;
      }
      .btn-glow:hover {
        box-shadow: 0 0 36px rgba(0,166,81,0.4), 0 1px 0 rgba(255,255,255,0.1) inset;
      }

      /* ── Card hover lift with green border ───────────────────────── */
      .card-hover {
        transition: background 0.18s ease, border-color 0.18s ease, transform 0.18s ease;
      }
      .card-hover:hover {
        background: rgba(255,255,255,0.06) !important;
        border-color: rgba(0,166,81,0.28) !important;
        transform: translateY(-1px);
      }

      /* ── Leaflet dark theme ───────────────────────────────────────── */
      .leaflet-container {
        background: #0B0F1A;
        font-family: 'DM Sans', system-ui, sans-serif;
      }
      .leaflet-bar a,
      .leaflet-bar a:hover {
        background-color: #111827 !important;
        border-color: rgba(255,255,255,0.1) !important;
        color: #F0F4FF !important;
      }
      .leaflet-bar a:hover { background-color: #1a2235 !important; }
      .leaflet-control-attribution {
        background: rgba(11,15,26,0.75) !important;
        color: rgba(255,255,255,0.1) !important;
        font-size: 9px !important;
        padding: 2px 6px !important;
        border-radius: 4px !important;
      }
      .leaflet-control-attribution a { color: rgba(255,255,255,0.1) !important; }
      /* Popup shell */
      .pw-leaflet-popup .leaflet-popup-content-wrapper {
        background: #111827 !important;
        border: 1px solid rgba(255,255,255,0.08) !important;
        border-radius: 10px !important;
        box-shadow: 0 8px 32px rgba(0,0,0,0.5) !important;
        padding: 0 !important;
      }
      .pw-leaflet-popup .leaflet-popup-content { margin: 0 !important; }
      .pw-leaflet-popup .leaflet-popup-tip-container { display: none !important; }
      .pw-leaflet-popup .leaflet-popup-close-button {
        color: #4A5470 !important;
        font-size: 16px !important;
        top: 5px !important;
        right: 7px !important;
      }
      /* Popup content helpers */
      .pw-popup { padding: 12px 14px; min-width: 160px; }
      .pw-popup-title { font-size: 13px; font-weight: 700; color: #F0F4FF; margin: 0 0 3px; }
      .pw-popup-sub   { font-size: 11px; color: #4A5470; margin: 0 0 8px; }
      .pw-popup-rows  {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 3px 12px;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
