<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PowerWatch Nigeria</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              bg: '#0F172A',
              surface: '#1E293B',
              accent: '#2ECC71',
              danger: '#E74C3C',
              warning: '#F39C12',
              textPrimary: '#F8FAFC',
              textMuted: '#94A3B8',
              border: '#334155',
            },
            fontFamily: {
              sans: ['Inter', 'system-ui', 'sans-serif'],
            },
            borderRadius: {
              card: '12px',
              btn: '8px',
            },
            animation: {
              'pulse-slow': 'pulse-slow 2s ease-in-out infinite',
              'pulse-danger': 'pulse-danger 2s ease-in-out infinite',
            },
            keyframes: {
              'pulse-slow': {
                '0%, 100%': { opacity: '1' },
                '50%': { opacity: '0.6' },
              },
              'pulse-danger': {
                '0%, 100%': { boxShadow: '0 0 0 0 rgba(231, 76, 60, 0.7)' },
                '50%': { boxShadow: '0 0 0 12px rgba(231, 76, 60, 0)' },
              },
            },
          },
        },
      };
    </script>
    <style>
      body {
        font-family: 'Inter', system-ui, sans-serif;
        background-color: #0F172A;
        color: #F8FAFC;
      }
      @keyframes pulse-slow {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.6; }
      }
      @keyframes pulse-danger-shadow {
        0%, 100% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.7); }
        50% { box-shadow: 0 0 0 16px rgba(231, 76, 60, 0); }
      }
      @keyframes pulse-success-shadow {
        0%, 100% { box-shadow: 0 0 0 0 rgba(46, 204, 113, 0.7); }
        50% { box-shadow: 0 0 0 16px rgba(46, 204, 113, 0); }
      }
      .btn-outage {
        animation: pulse-danger-shadow 2s ease-in-out infinite;
      }
      .btn-restore {
        animation: pulse-success-shadow 2s ease-in-out infinite;
      }
      .banner-pulse {
        animation: pulse-slow 2s ease-in-out infinite;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
