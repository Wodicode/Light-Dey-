<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PowerWatch Nigeria</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              bg: '#0F172A',
              surface: '#1E293B',
              accent: '#2ECC71',
              danger: '#E74C3C',
              warning: '#F39C12',
              textPrimary: '#F8FAFC',
              textMuted: '#94A3B8',
              border: '#334155',
            },
            fontFamily: {
              sans: ['Inter', 'system-ui', 'sans-serif'],
            },
            borderRadius: {
              card: '12px',
              btn: '8px',
            },
          },
        },
      };
    </script>
    <style>
      /* ── Timing functions ─────────────────────────────────────────── */
      :root {
        --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
        --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
        --ease-out-quart: cubic-bezier(0.25, 1, 0.5, 1);
      }

      /* ── Base ─────────────────────────────────────────────────────── */
      html { scroll-behavior: smooth; }

      body {
        font-family: 'Inter', system-ui, sans-serif;
        background-color: #0F172A;
        color: #F8FAFC;
        -webkit-tap-highlight-color: transparent;
        -webkit-font-smoothing: antialiased;
      }

      /* ── Page transition ──────────────────────────────────────────── */
      @keyframes page-enter {
        from { opacity: 0; transform: translateY(8px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      .page-enter {
        animation: page-enter 0.22s var(--ease-out-expo) both;
      }

      /* ── Toast ────────────────────────────────────────────────────── */
      @keyframes toast-enter {
        from { opacity: 0; transform: translateX(10px) scale(0.95); }
        to   { opacity: 1; transform: translateX(0) scale(1); }
      }
      .toast-enter {
        animation: toast-enter 0.22s var(--ease-out-expo) both;
      }

      /* ── Outage button — layered shadow pulse ─────────────────────── */
      @keyframes outage-pulse {
        0%, 100% {
          box-shadow:
            0 0 0 0 rgba(231, 76, 60, 0.45),
            0 6px 32px rgba(231, 76, 60, 0.25);
        }
        50% {
          box-shadow:
            0 0 0 14px rgba(231, 76, 60, 0),
            0 6px 32px rgba(231, 76, 60, 0.08);
        }
      }
      .btn-outage {
        animation: outage-pulse 2.2s ease-in-out infinite;
        transition: transform 0.12s var(--spring), opacity 0.12s ease;
      }
      .btn-outage:active { transform: scale(0.97); }

      /* ── Restore button ───────────────────────────────────────────── */
      @keyframes restore-pulse {
        0%, 100% {
          box-shadow:
            0 0 0 0 rgba(46, 204, 113, 0.45),
            0 6px 32px rgba(46, 204, 113, 0.25);
        }
        50% {
          box-shadow:
            0 0 0 14px rgba(46, 204, 113, 0),
            0 6px 32px rgba(46, 204, 113, 0.08);
        }
      }
      .btn-restore {
        animation: restore-pulse 2.2s ease-in-out infinite;
        transition: transform 0.12s var(--spring), opacity 0.12s ease;
      }
      .btn-restore:active { transform: scale(0.97); }

      /* ── Banner ───────────────────────────────────────────────────── */
      @keyframes banner-breathe {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0.82; }
      }
      .banner-pulse {
        animation: banner-breathe 2.5s ease-in-out infinite;
      }

      /* ── Blink dot ────────────────────────────────────────────────── */
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0.2; }
      }
      .blink { animation: blink 1.1s ease-in-out infinite; }

      /* ── Skeleton shimmer ─────────────────────────────────────────── */
      @keyframes shimmer {
        0%   { background-position: -200% 0; }
        100% { background-position:  200% 0; }
      }
      .skeleton {
        background: linear-gradient(
          90deg,
          #1E293B 25%,
          #263447 50%,
          #1E293B 75%
        );
        background-size: 200% 100%;
        animation: shimmer 1.6s ease-in-out infinite;
        border-radius: 6px;
      }

      /* ── Interactive card lift ────────────────────────────────────── */
      .card-lift {
        transition: transform 0.18s var(--ease-out-expo), box-shadow 0.18s ease;
      }
      .card-lift:hover {
        transform: translateY(-1px);
        box-shadow: 0 8px 24px rgba(0,0,0,0.2);
      }

      /* ── Nav tab press ────────────────────────────────────────────── */
      .nav-tab { transition: color 0.15s ease, background-color 0.15s ease, transform 0.1s var(--spring); }
      .nav-tab:active { transform: scale(0.88); }

      /* ── Button press utility ─────────────────────────────────────── */
      .btn-press {
        transition: transform 0.1s var(--spring), opacity 0.1s ease, box-shadow 0.15s ease;
      }
      .btn-press:active { transform: scale(0.97); opacity: 0.9; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
